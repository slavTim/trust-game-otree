{% extends "global/Page.html" %}
{% load staticfiles otree %}

{% block title %}
    Эксперимент завершен
{% endblock %}

{% block content %}
    <div class="panel panel-success">
        <div class="panel-heading">
            <h3>Ваши итоговые результаты</h3>
        </div>
        <div class="panel-body">
            <p>
                Вы сыграли <strong>{{ num_rounds }}</strong> раундов.
            </p>
            <p>
                <strong>Ваш общий выигрыш: {{ total_payoff }}</strong>
            </p>
            <p>
                Спасибо за участие в эксперименте!
            </p>
        </div>
    </div>
{% endblock %}
